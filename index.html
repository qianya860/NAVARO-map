<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no, width=device-width">
    <title>NOVARO诺伽 - 全国展厅分布</title>
    <style>
        html, body, #container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* 信息窗体样式 */
        .custom-info {
            padding: 10px;
            background: #fff;
            border-radius: 4px;
            font-family: "Microsoft YaHei", sans-serif;
            min-width: 220px;
        }
        .custom-info strong {
            color: #e83534;
            font-size: 15px;
            display: block;
            margin-bottom: 5px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        .custom-info p {
            margin: 5px 0;
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }
        /* 导航按钮样式 */
        .nav-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 5px 12px;
            background-color: #108ee9;
            color: #fff;
            text-decoration: none;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
        }
        .nav-btn:hover {
            background-color: #0d73bd;
        }
    </style>
</head>
<body>

    <div id="container"></div>

    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: '68a5bab4875a8c832cdc0d5597aca5f3', 
        }
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=7639ee5e15dcd7d785e584f831c2d048"></script>

    <script>
        var map = new AMap.Map('container', {
            zoom: 5,
            center: [110.00, 30.00],
            viewMode: '2D'
        });

        var storeData = [
            { name: "NOVARO展厅（常州）", position: [120.111262, 31.726854], address: "江苏省常州市武进区横林崔桥崔北工业区梅巷路12号" },
            { name: "NOVARO展厅（广东佛山）", position: [113.000501, 23.121306], address: "广东省佛山市南海区狮山镇博爱中路69号京东数字产业园659" },
            { name: "NOVARO展厅（临沂）", position: [118.221942, 35.099386], address: "山东省临沂市兰山区创业路1088号5号楼" },
            { name: "NOVARO展厅（成都）", position: [103.697688, 30.632958], address: "四川省成都市崇州市崇阳街道崇阳大道1号四川智能大厦" },
            { name: "NOVARO展厅（广东肇庆）", position: [112.827725, 23.228665], address: "广东省肇庆市四会市大沙镇南江工业园工业大道21号" }
        ];

        storeData.forEach(function(store) {
            var marker = new AMap.Marker({
                position: store.position,
                title: store.name,
                map: map
            });

            marker.on('click', function() {
                // 构建导航链接：跳转到高德地图规划路径
                // t=0表示驾车模式，也可以选t=2(公交)或t=4(步行)
                var navUrl = `https://uri.amap.com/navigation?to=${store.position[0]},${store.position[1]},${store.name}&mode=car&policy=1&src=mypage&coordinate=gcj02&callnative=1`;

                var infoContent = `
                    <div class="custom-info">
                        <strong>${store.name}</strong>
                        <p>地址：${store.address}</p>
                        <a class="nav-btn" href="${navUrl}" target="_blank">直接导航 (去这里)</a>
                    </div>`;
                
                var infoWindow = new AMap.InfoWindow({
                    content: infoContent,
                    offset: new AMap.Pixel(0, -30)
                });
                infoWindow.open(map, marker.getPosition());
            });
        });

        map.setFitView();

        AMap.plugin(['AMap.ToolBar'], function(){
            map.addControl(new AMap.ToolBar());
        });
    </script>
</body>
</html>
